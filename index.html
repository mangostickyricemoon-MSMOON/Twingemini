<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Twingemini</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/src/assets/favicon.png" />

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #000000;
      overflow: hidden;
    }

    .confirm-exit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .confirm-exit-content {
      background: rgba(17,17,17,0.8);
      padding: 1.5rem;
      border-radius: 10px;
      text-align: center;
      color: #fff;
      box-shadow: 0 0 20px rgba(255,0,100,0.6);
    }

    .confirm-exit-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .confirm-yes-btn,
    .confirm-no-btn {
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      color: #fff;
    }

    .confirm-yes-btn {
      background: linear-gradient(90deg, #ff0066, #ffcc00);
    }

    .confirm-no-btn {
      background: linear-gradient(90deg, #00ffff, #020a7a);
    }

    /* ✅ Fullscreen Button */
    .fullscreen-btn-container {
      width: 100%;
      text-align: center;
      margin-top: 1rem;
    }

    .fullscreen-btn {
      background: linear-gradient(90deg, #00ffff, #020a7a);
      color: #fff;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,255,255,0.6);
    }

    .fullscreen-btn:hover {
      background: linear-gradient(90deg, #ff0066, #ffcc00);
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DocCG8BE.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-C8QYH13P.css">
</head>

<body>
  <header class="main-header">
    <div class="main-header-container">
      <div class="logo">
        <img src="assets/PlayX.png" alt="PlayX Logo" />
      </div>
      <nav>
        <ul>
          <li><a class="btn-home" href="#" data-link="https://www.msmoon.net">MSMoon</a></li>
          <li><a class="btn-playx" href="#" data-link="https://mangoplayx.msmoon.net">MangoPlayX</a></li>
          <li><a class="btn-donate" href="#" data-link="https://donate.msmoon.net">Donate</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="banner">
    <img src="assets/banner.jpg" alt="Site Banner" class="banner-img" />
  </div>
  
  <div id="root"></div>
  
  <!-- ✅ Fullscreen Button -->
  <div class="fullscreen-btn-container">
    <button id="fullscreen-btn" class="fullscreen-btn">Fullscreen</button>
  </div>

  <!-- ✅ Confirm Exit Modal -->
  <div id="confirm-exit" class="confirm-exit-overlay" style="display:none;">
    <div class="confirm-exit-content">
      <h3>Do you want to leave this page?</h3>
      <div class="confirm-exit-buttons">
        <button class="confirm-yes-btn" id="confirm-yes">Yes</button>
        <button class="confirm-no-btn" id="confirm-no">No</button>
      </div>
    </div>
  </div>

  <script>
    // ✅ ตั้งค่า initial state ตอนโหลด (ของ confirm-exit)
    window.addEventListener("load", () => {
      history.replaceState({ modal: false }, "");
      history.pushState({ modal: true }, ""); // dummy state
    });

    let pendingLink = null;
    const confirmExit = document.getElementById("confirm-exit");
    const confirmYes = document.getElementById("confirm-yes");
    const confirmNo = document.getElementById("confirm-no");

    // ✅ คลิกเมนู → เปิด modal
    document.querySelectorAll("nav a").forEach(link => {
      link.addEventListener("click", e => {
        e.preventDefault();
        pendingLink = link.getAttribute("data-link");
        confirmExit.style.display = "flex";
      });
    });

    // ✅ Yes → ไปยังลิงก์ หรือกลับไปหน้าเก่าก่อนเข้าเว็บเกม
    confirmYes.addEventListener("click", () => {
      if (pendingLink) {
        window.location.href = pendingLink;
      } else {
        window.location.href = document.referrer || "/"; 
      }
    });

    // ✅ No → ปิด modal และกลับเข้าเกม
    confirmNo.addEventListener("click", () => {
      confirmExit.style.display = "none";
      pendingLink = null;
      history.pushState({ modal: true }, "");
    });

    // ✅ ดักจับ back/forward
    window.addEventListener("popstate", (event) => {
      if (event.state && event.state.modal) {
        confirmExit.style.display = "flex";
        history.pushState({ modal: true }, "");
      }
    });

    // ✅ ดักจับการเปลี่ยน fullscreen
      document.addEventListener("fullscreenchange", () => {
        if (!document.fullscreenElement) {
          // ออกจาก fullscreen → แสดงปุ่มอีกครั้ง
          fullscreenBtn.style.display = "inline-block";
          fullscreenBtn.textContent = "Fullscreen"; // ให้กลับมาเป็น Fullscreen
        } else {
          // เข้า fullscreen → ซ่อนปุ่ม
          fullscreenBtn.style.display = "none";
        }
      });


    // ✅ Fullscreen Button toggle
      const fullscreenBtn = document.getElementById("fullscreen-btn");

      // ✅ toggle fullscreen
      fullscreenBtn.addEventListener("click", () => {
        if (!document.fullscreenElement) {
          const docEl = document.documentElement;
          if (docEl.requestFullscreen) {
            docEl.requestFullscreen();
          } else if (docEl.webkitRequestFullscreen) {
            docEl.webkitRequestFullscreen();
          } else if (docEl.msRequestFullscreen) {
            docEl.msRequestFullscreen();
          }
          // เข้า fullscreen → ซ่อนปุ่ม
          fullscreenBtn.style.display = "none";
        }
      });

      // ✅ ดักจับการเปลี่ยน fullscreen
      document.addEventListener("fullscreenchange", () => {
        if (!document.fullscreenElement) {
          // ออกจาก fullscreen → แสดงปุ่มอีกครั้ง
          fullscreenBtn.style.display = "inline-block";
        }
      });

    </script>

  
</body>
</html>
