<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Twingemini</title>

    <!-- ✅ viewport สำหรับ responsive ทุกอุปกรณ์ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ favicon -->
    <link rel="icon" type="image/png" href="/src/assets/favicon.png" />

    <!-- ✅ global stylesheet -->

    <!-- ✅ Vite จะ inject asset เอง -->

    <!-- ✅ CSS สำหรับท้องฟ้าและดาว -->
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: radial-gradient(ellipse at bottom, #0d1c30 0%, #091324 100%),
                    linear-gradient(to bottom, rgba(33,56,88, 0.8), rgba(24,47,78, 1));
        overflow: hidden;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle 2s infinite alternate;
        z-index: -1;   /* ✅ ส่งดาวไปอยู่หลังสุด */
      }

      @keyframes twinkle {
        from { opacity: 0.3; }
        to   { opacity: 1; }
      }
    </style>
    <script type="module" crossorigin src="/Twingemini/assets/index-BOhE5hzb.js"></script>
    <link rel="stylesheet" crossorigin href="/Twingemini/assets/index-B1ZKH4O8.css">
  </head>
  <body>
    <!-- ✅ Header ใช้ index.css -->
    <header class="main-header">
      <div class="main-header-container">
        <div class="logo">
          <img src="assets/PlayX.png" alt="PlayX Logo" />
        </div>
        <nav>
          <ul>
            <li><a class="btn-home" href="https://www.msmoon.net">MSMoon</a></li>
            <li><a class="btn-playx" href="https://mangoplayx.msmoon.net">MangoPlayX</a></li>
            <li><a class="btn-donate" href="https://donate.msmoon.net">Donate</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- ✅ Banner ใช้ index.css -->
    <div class="banner">
      <img src="assets/banner.jpg" alt="Site Banner" class="banner-img" />
    </div>

    <!-- ✅ root ของ React -->
    <div id="root"></div>

    <!-- ✅ สคริปต์สร้างดาวสุ่ม -->
    <script>
      const numStars = 50;
      for (let i = 0; i < numStars; i++) {
        const star = document.createElement("div");
        star.className = "star";
        star.style.top = Math.random() * window.innerHeight + "px";
        star.style.left = Math.random() * window.innerWidth + "px";
        star.style.animationDuration = (1 + Math.random() * 3) + "s";
        star.style.width = (Math.random() * 2 + 1) + "px";
        star.style.height = star.style.width;
        document.body.appendChild(star);
      }
    </script>
  </body>
</html>
